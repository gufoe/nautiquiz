# Production: UI + API behind Caddy on port 80. SQLite persists in volume `nautiquiz_sqlite`.
#
# Usage:
#   JWT_SECRET=$(openssl rand -hex 32) docker compose -f docker-compose.prod.yml up -d --build
#
# Optional: create `.env` with JWT_SECRET and UI_ORIGIN (comma-separated browser origins for CORS).

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in the environment or .env}
      SQLITE_PATH: /data/nautiquiz.sqlite
      UI_ORIGIN: ${UI_ORIGIN:-http://localhost,http://127.0.0.1}
      PORT: "3333"
    volumes:
      - nautiquiz_sqlite:/data
    expose:
      - "3333"
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8080"
    restart: unless-stopped

  edge:
    image: caddy:2-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - ui
    restart: unless-stopped

volumes:
  nautiquiz_sqlite:
